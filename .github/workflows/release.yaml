name: Release Go Binaries in tar.gz

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: false

  build-artifacts:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: ["386", amd64, arm64]
        exclude:
          - goarch: "386"
            goos: darwin
    steps:
      - uses: actions/checkout@v6.0.0

      - name: Setup Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Build and Package
        id: build_package
        run: |
          set -euo pipefail

          mkdir -p dist
          BIN_NAME="mdx"
          VERSION="${{ github.ref_name }}"
          TARGET_DIR="dist/${{ matrix.goos }}-${{ matrix.goarch }}"
          ARCHIVE_BASE="mdx_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "${TARGET_DIR}"

          ARCHIVE_NAME="${ARCHIVE_BASE}.tar.gz"

          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" go build -o "${TARGET_DIR}/${BIN_NAME}" ./
          cp LICENSE README.md "${TARGET_DIR}/"

          tar -C "${TARGET_DIR}" -czf "dist/${ARCHIVE_NAME}" "${BIN_NAME}" LICENSE README.md

          echo "archive_name=${ARCHIVE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Prepare nFPM env
        if: matrix.goos == 'linux'
        run: |
          set -euo pipefail
          mkdir -p bin dist/packages
          cp "dist/${{ matrix.goos }}-${{ matrix.goarch }}/mdx" ./bin/mdx
          echo "MDX_VERSION=${GITHUB_REF_NAME#v}" >> "${GITHUB_ENV}"
          echo "GOARCH=${{ matrix.goarch }}" >> "${GITHUB_ENV}"

      - name: Create deb package
        if: matrix.goos == 'linux'
        uses: burningalchemist/action-gh-nfpm@v1
        with:
          nfpm_version: 2.45.0
          packager: deb
          config: packaging/deb.yaml
          target: dist/packages/

      - name: Create rpm package
        if: matrix.goos == 'linux'
        uses: burningalchemist/action-gh-nfpm@v1
        with:
          nfpm_version: 2.45.0
          packager: rpm
          config: packaging/rpm.yaml
          target: dist/packages/

      - name: Create apk package
        if: matrix.goos == 'linux'
        uses: burningalchemist/action-gh-nfpm@v1
        with:
          nfpm_version: 2.45.0
          packager: apk
          config: packaging/apk.yaml
          target: dist/packages/

      - name: Create archlinux package
        if: matrix.goos == 'linux'
        uses: burningalchemist/action-gh-nfpm@v1
        with:
          nfpm_version: 2.45.0
          packager: archlinux
          config: packaging/archlinux.yaml
          target: dist/packages/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ steps.build_package.outputs.archive_name }}
            dist/packages/*
          if-no-files-found: error

  build-windows-artifacts:
    name: Build and Sign Windows Artifacts
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v6.0.0

      - name: Setup Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Build Windows binary
        shell: bash
        run: |
          set -euo pipefail
          TARGET_DIR="dist/windows-amd64"
          mkdir -p "${TARGET_DIR}"
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o "${TARGET_DIR}/mdx.exe" ./
          cp LICENSE README.md "${TARGET_DIR}/"

      - name: Decode signing password
        id: decode_signing_password
        shell: powershell
        run: |
          $password = [Text.Encoding]::UTF8.GetString(
            [Convert]::FromBase64String("${{ secrets.WINDOWS_CERT_PASSWORD_B64 }}")
          )
          Add-Content -Path $env:GITHUB_OUTPUT -Value "password=$password"

      - name: Sign Windows artifacts
        uses: skymatic/code-sign-action@v3
        with:
          certificate: ${{ secrets.WINDOWS_CERT_PFX_B64 }}
          password: ${{ steps.decode_signing_password.outputs.password }}
          certificatesha1: ${{ secrets.WINDOWS_CERT_SHA1 }}
          description: >-
            mdx is a command-line interface program for downloading manga from the
            MangaDex - https://mangadex.org . The program uses MangaDex API
            (https://api.mangadex.org/docs) to fetch manga content.
          timestampUrl: http://timestamp.digicert.com
          folder: dist/windows-amd64

      - name: Verify signature
        shell: powershell
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          & $signtool verify /pa /v dist/windows-amd64/mdx.exe

      - name: Package signed Windows zip
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}"
          $targetDir = "dist/windows-amd64"
          $archiveName = "mdx_${version}_windows_amd64.zip"
          Push-Location $targetDir
          try {
            Compress-Archive -Path "mdx.exe", "LICENSE", "README.md" -DestinationPath "..\$archiveName" -Force
          }
          finally {
            Pop-Location
          }

      - name: Install go-msi
        run: choco install -y "go-msi"

      - name: Prepare MSI metadata
        id: msi_meta
        shell: bash
        run: |
          set -euo pipefail
          echo "msi_version=${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"

      - name: Build Windows Installer MSI
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p application
          cp "dist/windows-amd64/mdx.exe" "application/mdx.exe"

      - name: Create Windows Installer MSI
        uses: AliceOh/CreateWindowsInstaller@1.0.0
        with:
          exefile: dist/windows-amd64/mdx.exe
          version: ${{ steps.msi_meta.outputs.msi_version }}

      - name: Rename MSI
        shell: bash
        run: |
          set -euo pipefail
          TARGET_DIR="dist/windows-amd64"
          VERSION="${{ github.ref_name }}"
          mv "${TARGET_DIR}/mdx.exe.msi" "${TARGET_DIR}/mdx-${VERSION}-windows-installer.msi"

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-windows-amd64
          path: |
            dist/mdx_${{ github.ref_name }}_windows_amd64.zip
            dist/windows-amd64/mdx-${{ github.ref_name }}-windows-installer.msi
          if-no-files-found: error

  upload-assets:
    name: Upload Assets to Release
    runs-on: ubuntu-latest
    needs:
      - create-release
      - build-artifacts
      - build-windows-artifacts
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8.0.0
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: List release files
        run: find dist -type f | sort

      - name: Upload Artifacts to Release
        uses: svenstaro/upload-release-action@2.11.4
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/**/*
          file_glob: true
          tag: ${{ github.ref_name }}
          overwrite: true
