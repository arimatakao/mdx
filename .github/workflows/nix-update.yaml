name: Nix Update

on:
  push:
    tags:
      - "nixupdate-*"

permissions:
  contents: write

jobs:
  nix-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31

      - name: Update flake.lock
        run: nix flake update

      - name: Recompute vendorHash
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's|vendorHash = "sha256-[^"]*";|vendorHash = lib.fakeHash;|' nix/default.nix

          LOG="$(mktemp)"
          if nix build .#mdx > /dev/null 2>"$LOG"; then
            echo "Build succeeded unexpectedly with fake hash"
            exit 1
          fi

          NEW_HASH="$(awk '/got:[[:space:]]/{for(i=1;i<=NF;i++) if($i ~ /^sha256-/) print $i}' "$LOG" | tail -n1)"
          if [ -z "$NEW_HASH" ]; then
            echo "Could not parse vendor hash from nix output:"
            cat "$LOG"
            exit 1
          fi

          sed -i "s|vendorHash = lib.fakeHash;|vendorHash = \"$NEW_HASH\";|" nix/default.nix

      - name: Verify
        run: nix build .#mdx

      - name: Check changes
        id: check_changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions-js/push@v1.5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: "chore(nix): update flake.lock and vendorHash"
          branch: main
          rebase: true
          directory: .
          empty: false
      - name: No changes
        if: steps.check_changes.outputs.has_changes != 'true'
        shell: bash
        run: echo "No changes"
