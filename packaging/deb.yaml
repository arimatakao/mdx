name: mdx
arch: ${GOARCH}
platform: linux
version: ${MDX_VERSION}
version_schema: semver
release: 1
section: utils
priority: optional
maintainer: arimatakao
description: |
  mdx is a CLI application for downloading manga from MangaDex.
homepage: https://github.com/arimatakao/mdx
license: MIT

contents:
  - src: ./bin/mdx
    dst: /usr/bin/mdx
    file_info:
      mode: 0755

deb:
  compression: xz
  signature:
    method: debsign
    key_file: ${NFPM_DEB_KEY_FILE}
    key_id: ${NFPM_DEB_KEY_ID}
    signer: ${NFPM_DEB_SIGNER}
    type: origin
